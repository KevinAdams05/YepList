<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="linGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C7401A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="andGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2D8F47;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5A4BD1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B9FB5"/>
    </marker>
  </defs>

  <!-- Connection lines: clients to API -->
  <path d="M255 60 L370 60 Q390 60 390 80 L390 140" stroke="#9B9FB5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="160" x2="370" y2="160" stroke="#9B9FB5" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M255 260 L370 260 Q390 260 390 240 L390 180" stroke="#9B9FB5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Connection line: API to DB -->
  <line x1="580" y1="160" x2="660" y2="160" stroke="#9B9FB5" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Protocol labels -->
  <rect x="290" y="72" width="60" height="18" rx="9" fill="#F0EDF7" opacity="0.9"/>
  <text x="320" y="85" font-size="10" fill="#6C5CE7" text-anchor="middle" font-weight="600">REST</text>

  <rect x="290" y="148" width="60" height="18" rx="9" fill="#F0EDF7" opacity="0.9"/>
  <text x="320" y="161" font-size="10" fill="#6C5CE7" text-anchor="middle" font-weight="600">REST</text>

  <rect x="290" y="226" width="60" height="18" rx="9" fill="#F0EDF7" opacity="0.9"/>
  <text x="320" y="239" font-size="10" fill="#6C5CE7" text-anchor="middle" font-weight="600">REST</text>

  <rect x="600" y="148" width="55" height="18" rx="9" fill="#E8F0FE" opacity="0.9"/>
  <text x="627" y="161" font-size="10" fill="#4A90D9" text-anchor="middle" font-weight="600">SQL</text>

  <!-- Windows Client -->
  <g filter="url(#shadow)">
    <rect x="30" y="25" width="225" height="70" rx="12" fill="url(#winGrad)"/>
    <rect x="56" y="46" rx="1" width="8" height="8" fill="#fff" fill-opacity="0.9"/>
    <rect x="66" y="46" rx="1" width="8" height="8" fill="#fff" fill-opacity="0.9"/>
    <rect x="56" y="56" rx="1" width="8" height="8" fill="#fff" fill-opacity="0.9"/>
    <rect x="66" y="56" rx="1" width="8" height="8" fill="#fff" fill-opacity="0.9"/>
    <text x="86" y="56" font-size="14" font-weight="600" fill="#fff">Windows</text>
    <text x="56" y="76" font-size="10" fill="#fff" fill-opacity="0.75">C# WinForms + Krypton</text>
  </g>

  <!-- Linux Client -->
  <g filter="url(#shadow)">
    <rect x="30" y="125" width="225" height="70" rx="12" fill="url(#linGrad)"/>
    <circle cx="72" cy="150" r="8" fill="#fff" fill-opacity="0.9"/>
    <ellipse cx="72" cy="161" rx="6" ry="4" fill="#fff" fill-opacity="0.7"/>
    <text x="90" y="156" font-size="14" font-weight="600" fill="#fff">Linux</text>
    <text x="56" y="176" font-size="10" fill="#fff" fill-opacity="0.75">Vala + GTK4 + libadwaita</text>
  </g>

  <!-- Android Client -->
  <g filter="url(#shadow)">
    <rect x="30" y="225" width="225" height="70" rx="12" fill="url(#andGrad)"/>
    <rect x="60" y="248" width="14" height="10" rx="3" fill="#fff" fill-opacity="0.9"/>
    <line x1="63" y1="246" x2="61" y2="242" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <line x1="71" y1="246" x2="73" y2="242" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <text x="84" y="256" font-size="14" font-weight="600" fill="#fff">Android</text>
    <text x="56" y="276" font-size="10" fill="#fff" fill-opacity="0.75">Kotlin + Room + Glance</text>
  </g>

  <!-- REST API -->
  <g filter="url(#shadow)">
    <rect x="380" y="110" width="200" height="100" rx="12" fill="url(#apiGrad)"/>
    <circle cx="430" cy="148" r="12" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <path d="M425 148 L430 143 L435 148 M425 148 L430 153 L435 148" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <text x="450" y="148" font-size="14" font-weight="600" fill="#fff">ASP.NET Core</text>
    <text x="450" y="166" font-size="11" fill="#fff" fill-opacity="0.8">REST API</text>
    <text x="420" y="192" font-size="10" fill="#fff" fill-opacity="0.65">Dapper  |  Port 5000</text>
  </g>

  <!-- MySQL Database -->
  <g filter="url(#shadow)">
    <rect x="670" y="115" width="180" height="90" rx="12" fill="url(#dbGrad)"/>
    <ellipse cx="720" cy="145" rx="11" ry="5.5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <path d="M709 145 L709 158 Q720 163.5 731 158 L731 145" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <path d="M709 151 Q720 156.5 731 151" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <text x="740" y="150" font-size="14" font-weight="600" fill="#fff">MySQL</text>
    <text x="740" y="168" font-size="11" fill="#fff" fill-opacity="0.8">8.0</text>
    <text x="710" y="190" font-size="10" fill="#fff" fill-opacity="0.65">Persistent storage</text>
  </g>

  <!-- Sync label -->
  <text x="480" y="295" font-size="11" fill="#9B9FB5" text-anchor="middle" font-style="italic">Timestamp-based polling sync (30s foreground, 15m background)</text>
</svg>
